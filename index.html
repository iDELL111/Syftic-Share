<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepseek 4.1</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/lucide@latest/dist/umd/lucide.js">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to right, #0f766e, #22c55e, #2dd4bf, #22d3ee, #38bdf8, #60a5fa, #818cf8, #c4b5fd);
        }
        #sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            transition: left 0.3s ease;
            z-index: 1000;
            padding: 2rem 1rem;
        }
        #sidebar.open {
            left: 0;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            color: #00C3FF;
            font-size: 2rem;
            font-weight: 700;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #00C3FF; }
            to { text-shadow: 0 0 20px #56A0D3, 0 0 30px #74ACDF; }
        }
        .social-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(86, 160, 211, 0.2);
            border-radius: 12px;
        }
        .social-item {
            flex: 1;
            text-align: center;
            padding: 0.8rem;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .social-item:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.2);
        }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.3);
            margin: 1.5rem 0;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            color: white;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            margin-bottom: 0.5rem;
        }
        .menu-item:hover, .menu-item.active {
            background: rgba(0, 195, 255, 0.3);
            transform: translateX(5px);
        }
        .menu-item i {
            width: 20px;
        }
        #main-content {
            margin-left: 0;
            transition: margin-left 0.3s ease;
            height: 100vh;
            overflow-y: auto;
            background: #F8F9FA;
            padding: 1rem;
        }
        #sidebar.open + #main-content {
            margin-left: 280px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #F1F3F5;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .menu-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #007BA7;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00C3FF, #56A0D3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .dashboard-content {
            max-width: 800px;
            margin: 0 auto;
        }
        .ai-input-container {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        .ai-title {
            color: #007BA7;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .ai-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid #E9ECEF;
            border-radius: 15px;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        .ai-input:focus {
            outline: none;
            border-color: #00C3FF;
            box-shadow: 0 0 0 3px rgba(0,195,255,0.1);
        }
        .send-btn {
            background: linear-gradient(45deg, #00C3FF, #56A0D3);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,195,255,0.4);
        }
        .response-container {
            margin-top: 2rem;
        }
        .message-bubble {
            padding: 1.5rem 1.5rem;
            border-radius: 20px;
            margin-bottom: 1rem;
            animation: slideUp 0.4s ease;
            max-width: 80%;
        }
        .user-message {
            background: #56A0D3;
            color: white;
            margin-left: auto;
        }
        .ai-message {
            background: linear-gradient(135deg, #007BA7, #74ACDF);
            color: white;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .starting-points {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 2rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .starting-toggle {
            cursor: pointer;
            font-weight: 600;
            color: #007BA7;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .starting-content {
            display: none;
        }
        .starting-content.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .pill {
            background: #E9ECEF;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }
        .pill:hover {
            background: #00C3FF;
            color: white;
            transform: translateY(-2px);
        }
        .news-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid #E9ECEF;
        }
        .news-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .lang-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .lang-btn {
            padding: 0.3rem 0.8rem;
            border: 1px solid #DEE2E6;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .lang-btn.active {
            background: #00C3FF;
            color: white;
            border-color: #00C3FF;
        }
        .screenshot-block {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(135, 206, 235, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            color: white;
            font-size: 1.5rem;
            text-align: center;
        }
        .screenshot-block.show {
            display: flex;
        }
        .hidden {
            display: none !important;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        @media (max-width: 768px) {
            #sidebar {
                width: 100%;
                left: -100%;
            }
            #sidebar.open + #main-content {
                margin-left: 0;
            }
        }
        .sea-waves {
            height: 60px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .wave {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 60px;
            background: linear-gradient(45deg, rgba(0,195,255,0.6), rgba(86,160,211,0.4));
            animation: wave 10s linear infinite;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        }
        .wave:nth-child(2) {
            animation: wave 10s linear infinite -2s;
            background: linear-gradient(45deg, rgba(116,172,223,0.5), rgba(0,123,167,0.3));
        }
        @keyframes wave {
            0% { transform: translateX(-50%) translateZ(0) scaleY(1); }
            50% { transform: translateX(-25%) translateZ(0) scaleY(0.55); }
            100% { transform: translateX(0%) translateZ(0) scaleY(1); }
        }
    </style>
</head>
<body>
    <!-- Screenshot Block Overlay -->
    <div class="screenshot-block" id="screenshotBlock">
        <div>Sorry, We Can't Provide</div>
        <button onclick="document.getElementById('screenshotBlock').classList.remove('show')" style="margin-top: 1rem; padding: 0.8rem 2rem; background: white; color: #87CEEB; border: none; border-radius: 25px; cursor: pointer;">OK</button>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="logo">
            <h1>Deepseek 4.1</h1>
            <div class="sea-waves">
                <div class="wave"></div>
                <div class="wave"></div>
            </div>
        </div>
        
        <!-- Social Apps Bar -->
        <div class="social-bar">
            <div class="social-item" onclick="openSocial('instagram')">
                <div style="font-size: 2rem; margin-bottom: 0.2rem;">📷</div>
                Instagram
            </div>
            <div class="social-item" onclick="openSocial('facebook')">
                <div style="font-size: 2rem; margin-bottom: 0.2rem;">📘</div>
                Facebook
            </div>
            <div class="social-item" onclick="openSocial('youtube')">
                <div style="font-size: 2rem; margin-bottom: 0.2rem;">▶️</div>
                YouTube
            </div>
            <div class="social-item" onclick="openSocial('whatsapp')">
                <div style="font-size: 2rem; margin-bottom: 0.2rem;">💬</div>
                WhatsApp
            </div>
            <div class="social-item" onclick="openSocial('deepseek')">
                <div style="font-size: 2rem; margin-bottom: 0.2rem;">🤖</div>
                Deepseek 4.1
            </div>
        </div>

        <div class="divider"></div>

        <!-- Menu Items -->
        <div class="menu-item active" data-section="dashboard">
            <i data-lucide="home"></i>
            <span>Dashboard</span>
        </div>
        <div class="menu-item" data-section="messages">
            <i data-lucide="message-circle"></i>
            <span>Messages</span>
        </div>
        <div class="menu-item" data-section="timeline">
            <i data-lucide="activity"></i>
            <span>Timeline</span>
        </div>
        <div class="menu-item" data-section="discover">
            <i data-lucide="search"></
